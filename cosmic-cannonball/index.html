<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Cosmo Cannon | Gravity Slingshot ✨</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #03020a;
            font-family: 'Segoe UI', 'Orbitron', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            color: white;
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #0a0722, #02010a);
        }
        /* UI glass panel */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #level-display, #shots-display {
            text-shadow: 0 0 6px #8a2be2;
            background: rgba(0,0,0,0.5);
            padding: 5px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 6, 25, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 28px 48px;
            text-align: center;
            border: 1px solid rgba(210, 180, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(106, 13, 173, 0.5);
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            font-family: monospace;
            letter-spacing: 1px;
        }
        #message-text {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(135deg, #f0e6ff, #b77eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }
        #message-box button {
            background: linear-gradient(90deg, #4c1d95, #7c3aed);
            border: none;
            font-size: 1.1rem;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.6);
        }
        #message-box button:hover {
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.9);
        }
        #instructions {
            position: absolute;
            bottom: 18px;
            left: 18px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-family: monospace;
            border-left: 3px solid #aa66ff;
            pointer-events: none;
            z-index: 10;
        }
        #instructions ul {
            margin: 6px 0;
            padding-left: 18px;
        }
        .power-indicator {
            position: absolute;
            bottom: 35px;
            right: 25px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffd966;
            border-right: 2px solid gold;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
        }
        @media (max-width: 700px) {
            #ui-container { font-size: 0.9rem; padding: 6px 12px; }
            #message-text { font-size: 1.4rem; }
            #message-box { padding: 18px 28px; }
        }
    </style>
</head>
<body>
<div id="ui-container">
    <div id="level-display">🌀 LEVEL 1</div>
    <div id="shots-display">✨ SHOTS: 0</div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="message-box">
    <p id="message-text"></p>
    <button id="message-button">➡ WARP NEXT ⬅</button>
</div>
<div id="instructions">
    <ul>
        <li>🎯 DRAG & RELEASE to shoot cosmic rock</li>
        <li>🌌 Planets bend spacetime (gravity wells)</li>
        <li>⚫ Reach the BLACK HOLE to win</li>
        <li>💥 Avoid planets & screen edges</li>
    </ul>
</div>
<div class="power-indicator" id="powerLevel">⚡ SLING POWER: 0%</div>

<script>
    (function(){
        // ---------- ENHANCED PHYSICS & VIBE ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ---------- GLOBALS ----------
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        let mousePos = { x: canvas.width/2, y: canvas.height/2 };
        let rock, blackHole;
        let planets = [];
        let level = 0;
        let shots = 0;
        
        // IMPROVED GRAVITY: higher constant + distance softening for smoother slingshots
        const GRAVITATIONAL_CONSTANT = 2.1;     // increased gravity feel
        const MAX_SPEED = 14.5;                  // punchier shots
        const MAX_DRAG_DIST = 220;               // extra drag length
        
        // PARTICLE & GLOW SYSTEMS
        let starField = [];
        let starParticles = [];   // shooting stars & dust
        let gravityRipples = [];   // dynamic gravitational lensing fx
        
        // DOM elements
        const levelDisplay = document.getElementById('level-display');
        const shotsDisplay = document.getElementById('shots-display');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');
        const messageButton = document.getElementById('message-button');
        const powerSpan = document.getElementById('powerLevel');
        
        // ---------- ADVANCED LEVELS: dynamic masses, extreme slingshots ----------
        const levels = [
            { // LEVEL 1 : classic intro
                rock: { x: 110, y: () => canvas.height / 2 },
                blackHole: { x: () => canvas.width - 110, y: () => canvas.height / 2, radius: 28, mass: 5200 },
                planets: [
                    { x: () => canvas.width / 2, y: () => canvas.height / 2, radius: 38, mass: 1800, colorHint: 'orange' },
                ],
                bgTint: '#0f0c2a'
            },
            { // LEVEL 2 : binary gravity wells + challenge
                rock: { x: 130, y: () => canvas.height / 2 + 40 },
                blackHole: { x: () => canvas.width - 130, y: () => canvas.height - 100, radius: 30, mass: 6000 },
                planets: [
                    { x: () => canvas.width / 2 - 80, y: () => canvas.height / 2 - 60, radius: 32, mass: 1400 },
                    { x: () => canvas.width / 2 + 110, y: () => canvas.height / 2 + 70, radius: 45, mass: 2200 },
                ],
                bgTint: '#12102e'
            },
            { // LEVEL 3 : gravity labyrinth
                rock: { x: 70, y: 70 },
                blackHole: { x: () => canvas.width - 70, y: () => canvas.height - 70, radius: 32, mass: 6500 },
                planets: [
                    { x: () => canvas.width / 2, y: () => canvas.height / 3, radius: 28, mass: 1100 },
                    { x: () => canvas.width / 3.5, y: () => canvas.height / 1.8, radius: 44, mass: 2100 },
                    { x: () => canvas.width * 0.72, y: () => canvas.height * 0.65, radius: 36, mass: 1700 }
                ],
                bgTint: '#0b0922'
            },
            { // LEVEL 4 : REPULSOR & DARK MATTER (negative mass + extra challenge)
                rock: { x: 120, y: () => canvas.height / 2 },
                blackHole: { x: () => canvas.width - 120, y: () => canvas.height / 2, radius: 30, mass: 5500 },
                planets: [
                     { x: () => canvas.width / 2, y: () => canvas.height / 2 + 110, radius: 34, mass: 1300 },
                     { x: () => canvas.width / 2, y: () => canvas.height / 2 - 110, radius: 34, mass: -1600 }, // ANTI-GRAVITY REPULSION
                     { x: () => canvas.width / 2 + 180, y: () => canvas.height / 2 - 50, radius: 28, mass: 950 },
                ],
                bgTint: '#0a0724'
            },
            { // LEVEL 5 : orbital gauntlet (epic)
                rock: { x: 100, y: 100 },
                blackHole: { x: () => canvas.width - 110, y: () => canvas.height - 120, radius: 35, mass: 7200 },
                planets: [
                    { x: () => canvas.width * 0.4, y: () => canvas.height * 0.2, radius: 42, mass: 2000 },
                    { x: () => canvas.width * 0.65, y: () => canvas.height * 0.55, radius: 36, mass: 1900 },
                    { x: () => canvas.width * 0.2, y: () => canvas.height * 0.7, radius: 33, mass: 1200 },
                    { x: () => canvas.width * 0.8, y: () => canvas.height * 0.3, radius: 40, mass: 2400, negative: false },
                ],
                bgTint: '#060418'
            }
        ];
        
        // ---- CLASSES with GLOW ----
        class SpaceObject {
            constructor(x, y, radius, colorScheme) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.colorScheme = colorScheme;
                this.glowIntensity = 0.5;
            }
            drawGlow() {
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.colorScheme.inner;
            }
            resetShadow() {
                ctx.shadowBlur = 0;
            }
            draw() {
                this.drawGlow();
                const grad = ctx.createRadialGradient(this.x-3, this.y-3, 2, this.x, this.y, this.radius);
                grad.addColorStop(0, this.colorScheme.inner);
                grad.addColorStop(1, this.colorScheme.outer);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
                this.resetShadow();
            }
        }
        
        class Rock extends SpaceObject {
            constructor(x, y) {
                super(x, y, 9, { inner: '#fff9e0', outer: '#f3b33d' });
                this.vx = 0;
                this.vy = 0;
                this.isMoving = false;
                this.trail = [];
                this.boostGlow = 0;
            }
            update() {
                if (!this.isMoving) return;
                this.trail.unshift({ x: this.x, y: this.y, life: 1.0 });
                if (this.trail.length > 42) this.trail.pop();
                for(let p of this.trail) p.life -= 0.018;
                this.trail = this.trail.filter(p => p.life > 0);
                
                this.x += this.vx;
                this.y += this.vy;
                this.boostGlow = Math.min(1, Math.hypot(this.vx, this.vy) / 12);
            }
            drawTrail() {
                for(let i=0; i<this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = t.life * 0.65;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 3.5 * t.life + 1, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha*0.7})`;
                    ctx.fill();
                }
            }
            draw() {
                this.drawTrail();
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#ffaa55';
                const grad = ctx.createRadialGradient(this.x-2, this.y-2, 2, this.x, this.y, this.radius);
                grad.addColorStop(0, '#fff2b5');
                grad.addColorStop(1, '#e68a2e');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 0;
                // inner core
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
                ctx.fillStyle = 'white';
                ctx.fill();
            }
        }
        
        class Planet extends SpaceObject {
            constructor(x, y, radius, mass) {
                const palettes = [
                    { inner: '#cc7b5c', outer: '#9a4630' }, // mars
                    { inner: '#6b9cc9', outer: '#2c5980' }, // ice
                    { inner: '#84c96e', outer: '#3e7a27' }, // forest
                    { inner: '#e8c56c', outer: '#b97f2e' }, // golden
                    { inner: '#b87ac9', outer: '#703c91' }  // nebula
                ];
                const selected = palettes[Math.floor(Math.random() * palettes.length)];
                super(x, y, radius, selected);
                this.mass = mass;
                this.glowPulse = Math.random() * Math.PI * 2;
            }
            drawGravityField() {
                const fieldRad = this.radius + Math.min(50, Math.abs(this.mass)/14);
                const grad = ctx.createRadialGradient(this.x, this.y, this.radius*0.6, this.x, this.y, fieldRad);
                if(this.mass > 0) {
                    grad.addColorStop(0, 'rgba(80, 150, 255, 0)');
                    grad.addColorStop(0.7, 'rgba(70, 130, 255, 0.08)');
                    grad.addColorStop(1, 'rgba(90, 160, 255, 0.18)');
                } else {
                    grad.addColorStop(0, 'rgba(255, 80, 100, 0)');
                    grad.addColorStop(0.6, 'rgba(255, 50, 80, 0.12)');
                    grad.addColorStop(1, 'rgba(255, 80, 110, 0.28)');
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, fieldRad, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
            }
            draw() {
                this.drawGravityField();
                super.draw();
                if(this.mass < 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius+3, 0, Math.PI*2);
                    ctx.strokeStyle = '#ff5766';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 8]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }
        
        class BlackHole extends SpaceObject {
            constructor(x, y, radius, mass) {
                super(x, y, radius, { inner: '#020006', outer: '#1c0f2e' });
                this.mass = mass || 5500;
                this.accretionGlow = 0;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 32;
                ctx.shadowColor = '#ba85ff';
                const outerRing = ctx.createRadialGradient(this.x, this.y, this.radius-2, this.x, this.y, this.radius*2.4);
                outerRing.addColorStop(0, '#2d0f47');
                outerRing.addColorStop(0.7, '#621b7a');
                outerRing.addColorStop(1, '#00000000');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius*2.1, 0, Math.PI*2);
                ctx.fillStyle = outerRing;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = '#010003';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius-4, 0, Math.PI*2);
                ctx.fillStyle = '#3c0b5a';
                ctx.fill();
                ctx.restore();
                // lensing effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius+8, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(180, 100, 230, 0.15)';
                ctx.fill();
            }
        }
        
        // ---- STARFIELD with PARALLAX & TWINKLE ----
        class StarLayer {
            constructor(count, size, speed, alpha) {
                this.stars = [];
                this.speed = speed;
                this.size = size;
                this.alpha = alpha;
                for(let i=0;i<count;i++) {
                    this.stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        baseX: Math.random() * canvas.width,
                        baseY: Math.random() * canvas.height,
                        twinkle: Math.random() * Math.PI*2
                    });
                }
            }
            draw(mouseX, mouseY, centerX, centerY) {
                for(let s of this.stars) {
                    let offsetX = (mouseX - centerX) * this.speed * 0.08;
                    let offsetY = (mouseY - centerY) * this.speed * 0.08;
                    let px = s.baseX - offsetX;
                    let py = s.baseY - offsetY;
                    if(px < -50) px += canvas.width + 100;
                    if(px > canvas.width+50) px -= canvas.width+100;
                    if(py < -50) py += canvas.height+100;
                    if(py > canvas.height+50) py -= canvas.height+100;
                    let twinkleFactor = 0.6 + 0.4 * Math.sin(Date.now() * 0.002 + s.twinkle);
                    ctx.fillStyle = `rgba(255, 240, 210, ${this.alpha * twinkleFactor})`;
                    ctx.beginPath();
                    ctx.arc(px, py, this.size, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        let starLayers = [];
        function initStars() {
            starLayers = [
                new StarLayer(200, 1.2, 0.3, 0.5),
                new StarLayer(120, 1.8, 0.6, 0.75),
                new StarLayer(70, 2.4, 0.9, 0.9)
            ];
        }
        
        // ---- COSMIC DUST & PARTICLE TRAILS ----
        function addTrailParticles(rockObj) {
            if(rockObj.isMoving && Math.hypot(rockObj.vx, rockObj.vy) > 0.5) {
                for(let i=0;i<2;i++) {
                    starParticles.push({
                        x: rockObj.x + (Math.random() - 0.5)*6,
                        y: rockObj.y + (Math.random() - 0.5)*6,
                        life: 0.9,
                        vx: -rockObj.vx*0.2 + (Math.random()-0.5)*1.2,
                        vy: -rockObj.vy*0.2 + (Math.random()-0.5)*1.2,
                        size: 2+Math.random()*3
                    });
                }
            }
            for(let i=starParticles.length-1;i>=0;i--) {
                let p = starParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if(p.life <= 0 || p.x < -50 || p.x > canvas.width+50 || p.y < -50 || p.y > canvas.height+50) {
                    starParticles.splice(i,1);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 180, 80, ${p.life * 0.7})`;
                    ctx.fill();
                }
            }
        }
        
        // ----- PHYSICS ENGINE (improved RK2 stability) -----
        function applyGravityRK() {
            if(!rock.isMoving) return;
            const bodies = [blackHole, ...planets];
            for(let body of bodies) {
                const dx = body.x - rock.x;
                const dy = body.y - rock.y;
                const distSq = dx*dx + dy*dy + 28; // soften factor to avoid extreme kicks
                const dist = Math.sqrt(distSq);
                const forceMag = (GRAVITATIONAL_CONSTANT * body.mass) / distSq;
                const accX = (dx / dist) * forceMag;
                const accY = (dy / dist) * forceMag;
                rock.vx += accX;
                rock.vy += accY;
            }
            // speed limiter to avoid infinite speed loops
            let spd = Math.hypot(rock.vx, rock.vy);
            if(spd > 23) {
                rock.vx = (rock.vx / spd) * 23;
                rock.vy = (rock.vy / spd) * 23;
            }
        }
        
        // collision & win conditions
        function checkCollisionsAndWin() {
            if(!rock.isMoving) return;
            const dxHole = blackHole.x - rock.x;
            const dyHole = blackHole.y - rock.y;
            if(Math.hypot(dxHole, dyHole) < blackHole.radius + rock.radius - 3) {
                winLevel();
                return;
            }
            for(let planet of planets) {
                const d = Math.hypot(planet.x - rock.x, planet.y - rock.y);
                if(d < planet.radius + rock.radius) {
                    resetShot(true);
                    return;
                }
            }
            if(rock.x < -40 || rock.x > canvas.width+40 || rock.y < -40 || rock.y > canvas.height+40) {
                resetShot(true);
            }
        }
        
        function winLevel() {
            rock.isMoving = false;
            messageText.textContent = '🌀 EVENT HORIZON REACHED! 🌀';
            messageButton.textContent = '➡ NEXT DIMENSION';
            messageBox.style.display = 'flex';
            messageButton.onclick = () => {
                level++;
                if(level >= levels.length) showEndGameMessage();
                else loadLevel(level);
                messageBox.style.display = 'none';
            };
        }
        
        function showEndGameMessage() {
            messageText.textContent = '⭐ GALACTIC VICTORY! ⭐';
            messageButton.textContent = '♾️ PLAY AGAIN';
            messageBox.style.display = 'flex';
            messageButton.onclick = () => {
                level = 0;
                loadLevel(0);
                messageBox.style.display = 'none';
            };
        }
        
        function resetShot(playSoundEffect = true) {
            rock.isMoving = false;
            rock.vx = 0;
            rock.vy = 0;
            rock.trail = [];
            // keep rock position so next shot starts from last spot (tension)
            if(rock.x < 20) rock.x = 20;
            if(rock.x > canvas.width-20) rock.x = canvas.width-20;
            if(rock.y < 20) rock.y = 20;
            if(rock.y > canvas.height-20) rock.y = canvas.height-20;
        }
        
        // ------ LOAD LEVEL ------
        function loadLevel(idx) {
            if(idx >= levels.length) {
                showEndGameMessage();
                return;
            }
            const lvl = levels[idx];
            const rockX = typeof lvl.rock.x === 'function' ? lvl.rock.x() : lvl.rock.x;
            const rockY = typeof lvl.rock.y === 'function' ? lvl.rock.y() : lvl.rock.y;
            rock = new Rock(rockX, rockY);
            const holeX = typeof lvl.blackHole.x === 'function' ? lvl.blackHole.x() : lvl.blackHole.x;
            const holeY = typeof lvl.blackHole.y === 'function' ? lvl.blackHole.y() : lvl.blackHole.y;
            blackHole = new BlackHole(holeX, holeY, lvl.blackHole.radius, lvl.blackHole.mass);
            planets = lvl.planets.map(p => {
                const px = typeof p.x === 'function' ? p.x() : p.x;
                const py = typeof p.y === 'function' ? p.y() : p.y;
                return new Planet(px, py, p.radius, p.mass);
            });
            shots = 0;
            updateUI();
            messageBox.style.display = 'none';
            starParticles = [];
        }
        
        function updateUI() {
            levelDisplay.innerHTML = `🌀 LEVEL ${level+1}`;
            shotsDisplay.innerHTML = `✨ SHOTS: ${shots}`;
        }
        
        // ----- PREDICTION PATH with advanced gravity -----
        function drawPrediction() {
            if(isDragging && !rock.isMoving) {
                const dx = dragStart.x - dragEnd.x;
                const dy = dragStart.y - dragEnd.y;
                const dist = Math.min(MAX_DRAG_DIST, Math.hypot(dx, dy));
                const power = dist / MAX_DRAG_DIST;
                const angle = Math.atan2(dy, dx);
                let initVx = Math.cos(angle) * power * MAX_SPEED;
                let initVy = Math.sin(angle) * power * MAX_SPEED;
                let simX = rock.x, simY = rock.y, simVx = initVx, simVy = initVy;
                const points = [];
                for(let step=0; step<140; step++) {
                    const bodies = [blackHole, ...planets];
                    for(let b of bodies) {
                        const ddx = b.x - simX;
                        const ddy = b.y - simY;
                        const dSq = ddx*ddx + ddy*ddy + 25;
                        const distM = Math.sqrt(dSq);
                        const force = (GRAVITATIONAL_CONSTANT * b.mass) / dSq;
                        simVx += (ddx / distM) * force;
                        simVy += (ddy / distM) * force;
                    }
                    simX += simVx;
                    simY += simVy;
                    points.push({x: simX, y: simY});
                    let col = false;
                    for(let pl of planets) {
                        if(Math.hypot(pl.x - simX, pl.y - simY) < pl.radius + 5) { col=true; break; }
                    }
                    if(col) break;
                    if(Math.hypot(blackHole.x - simX, blackHole.y - simY) < blackHole.radius) break;
                }
                ctx.beginPath();
                ctx.moveTo(rock.x, rock.y);
                for(let p of points) ctx.lineTo(p.x, p.y);
                ctx.strokeStyle = `rgba(255, 220, 140, ${0.4+power*0.3})`;
                ctx.lineWidth = 3;
                ctx.setLineDash([6, 12]);
                ctx.stroke();
                ctx.setLineDash([]);
                let percent = Math.floor(power*100);
                powerSpan.innerHTML = `⚡ SLING POWER: ${percent}%`;
            } else {
                powerSpan.innerHTML = `⚡ SLING POWER: 0%`;
            }
        }
        
        // ---- RENDER & GAME LOOP ----
        function resizeAndSetup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
            loadLevel(level);
        }
        
        let lastTimestamp = 0;
        function gameLoop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const centerX = canvas.width/2, centerY = canvas.height/2;
            for(let layer of starLayers) layer.draw(mousePos.x, mousePos.y, centerX, centerY);
            // draw planets & gravity fields
            for(let p of planets) p.draw();
            blackHole.draw();
            rock.draw();
            addTrailParticles(rock);
            applyGravityRK();
            rock.update();
            drawPrediction();
            checkCollisionsAndWin();
            requestAnimationFrame(gameLoop);
        }
        
        // ---- EVENT HANDLERS ----
        function handleMouseDown(e) {
            if(rock.isMoving) return;
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY };
            dragEnd = { x: e.clientX, y: e.clientY };
        }
        function handleMouseMove(e) {
            mousePos = { x: e.clientX, y: e.clientY };
            if(isDragging) dragEnd = { x: e.clientX, y: e.clientY };
        }
        function handleMouseUp(e) {
            if(!isDragging || rock.isMoving) { isDragging=false; return; }
            isDragging = false;
            const dx = dragStart.x - dragEnd.x;
            const dy = dragStart.y - dragEnd.y;
            const dist = Math.min(MAX_DRAG_DIST, Math.hypot(dx, dy));
            if(dist < 8) return;
            shots++;
            updateUI();
            const power = dist / MAX_DRAG_DIST;
            const angle = Math.atan2(dy, dx);
            rock.vx = Math.cos(angle) * power * MAX_SPEED;
            rock.vy = Math.sin(angle) * power * MAX_SPEED;
            rock.isMoving = true;
        }
        
        window.addEventListener('resize', ()=>{
            resizeAndSetup();
        });
        canvas.addEventListener('mousedown', handleMouseDown);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); const touch=e.touches[0]; handleMouseDown(touch); });
        canvas.addEventListener('touchmove', (e)=>{ e.preventDefault(); const touch=e.touches[0]; handleMouseMove(touch); });
        canvas.addEventListener('touchend', (e)=>{ e.preventDefault(); handleMouseUp(e); });
        
        resizeAndSetup();
        gameLoop();
    })();
</script>
</body>
</html>
